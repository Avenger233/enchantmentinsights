name: Build Mod

on:
  push: {}
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build NeoForge
        working-directory: 1.21.1
        run: |
          chmod +x gradlew
          ./gradlew :neoforge:build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-mod
          path: "1.21.1/**/build/libs/*.jar"
