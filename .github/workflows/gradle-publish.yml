name: Build Mod

on:
  push: {}
  workflow_dispatch: {}
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build NeoForge
        run: ./gradlew :1.21.11:neoforge:build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-mod
          path: "1.21.1/**/build/libs/*.jar"
